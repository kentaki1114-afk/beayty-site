<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="google-site-verification" content="Ta87HRUDordeHpRrkgI61VzaagZR58rP9NDZ-5L0hmM" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | BeautyBests</title>
  <meta name="description" content="BeautyBestsへのお問い合わせはこちらから。記事内容・広告掲載・その他ご質問をお気軽にどうぞ。">
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="css/style.css">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-W2QW21WVT5"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-W2QW21WVT5');
  </script>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="site-logo">Beauty<span>Bests</span>✦</a>
    <nav>
      <ul class="header-nav">
        <li><a href="index.html">ホーム</a></li>
        <li><a href="ranking.html">ランキング</a></li>
      </ul>
    </nav>
  </div>
</header>

<div style="max-width:820px;margin:0 auto;padding:48px 20px 80px;">

  <h1 style="font-size:26px;font-weight:800;color:var(--primary-dark);margin-bottom:12px;">お問い合わせ</h1>
  <p style="font-size:15px;color:var(--text-muted);margin-bottom:40px;">記事の内容・広告掲載・その他ご不明な点がございましたら、以下のフォームよりお気軽にご連絡ください。通常2〜3営業日以内にご返信いたします。</p>

  <form action="https://formspree.io/f/xlgkgqoa" method="POST" style="display:flex;flex-direction:column;gap:24px;">

    <div>
      <label style="display:block;font-size:14px;font-weight:700;color:var(--primary-dark);margin-bottom:8px;">お名前 <span style="color:#e53e3e;">*</span></label>
      <input type="text" name="name" required placeholder="山田 花子"
        style="width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;outline:none;box-sizing:border-box;">
    </div>

    <div>
      <label style="display:block;font-size:14px;font-weight:700;color:var(--primary-dark);margin-bottom:8px;">メールアドレス <span style="color:#e53e3e;">*</span></label>
      <input type="email" name="email" required placeholder="example@email.com"
        style="width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;outline:none;box-sizing:border-box;">
    </div>

    <div>
      <label style="display:block;font-size:14px;font-weight:700;color:var(--primary-dark);margin-bottom:8px;">お問い合わせ種別</label>
      <select name="category"
        style="width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;outline:none;box-sizing:border-box;background:#fff;">
        <option value="content">記事内容について</option>
        <option value="advertising">広告・タイアップについて</option>
        <option value="other">その他</option>
      </select>
    </div>

    <div>
      <label style="display:block;font-size:14px;font-weight:700;color:var(--primary-dark);margin-bottom:8px;">お問い合わせ内容 <span style="color:#e53e3e;">*</span></label>
      <textarea name="message" required rows="7" placeholder="お問い合わせ内容をご記入ください"
        style="width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;outline:none;resize:vertical;box-sizing:border-box;"></textarea>
    </div>

    <button type="submit"
      style="background:var(--primary);color:#fff;border:none;padding:14px 32px;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;align-self:flex-start;">
      送信する
    </button>

  </form>

  <p style="margin-top:32px;font-size:13px;color:var(--text-muted);">
    ※ご入力いただいた個人情報はお問い合わせへの返答にのみ使用し、第三者への提供は行いません。<br>
    詳しくは<a href="privacy.html" style="color:var(--primary);">プライバシーポリシー</a>をご確認ください。
  </p>

</div>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-bottom">
      <span>© 2026 BeautyBests All Rights Reserved.</span>
      <a href="index.html" style="color:#aaa;">トップへ戻る</a>
    </div>
  </div>
</footer>

</body>
</html>
